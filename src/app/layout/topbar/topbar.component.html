<header class="topbar">
  <div class="tb-left">
    <button class="tb-toggle" type="button" (click)="toggle.emit()" aria-label="Alternar menú">
      <i class="pi pi-bars"></i>
    </button>
    <h1 class="tb-title">{{ title() }}</h1>
  </div>

  <div class="tb-right">
    @if (session(); as s) {
      <button class="user-chip" type="button" (click)="menu.toggle($event)">
        <span class="avatar">{{ initial() }}</span>
        <span class="u-info">
          <span class="u-name">{{ s.username }}</span>
          <span class="u-meta">Empresa {{ s.empresaId }}</span>
        </span>
        <i class="pi pi-angle-down"></i>
      </button>
      <p-menu #menu [model]="userMenu" [popup]="true" appendTo="body" />
    }
  </div>
</header>
