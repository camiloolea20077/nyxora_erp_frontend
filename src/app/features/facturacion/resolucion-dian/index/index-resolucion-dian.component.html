<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-verified"></i></span>
      <div>
        <h1 class="head-title">Resoluciones DIAN</h1>
        <p class="head-sub">Numeración de facturas autorizada por la DIAN</p>
      </div>
    </div>
    <p-button label="Nueva resolución" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="toolbar">
    <span class="search">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Buscar por número o prefijo…"
        [(ngModel)]="search"
        (keyup.enter)="onSearch()"
      />
    </span>
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 14rem">Número</th>
          <th style="width: 7rem">Prefijo</th>
          <th>Rango</th>
          <th style="width: 10rem">Vence</th>
          <th style="width: 9rem" class="r">Consecutivo</th>
          <th style="width: 8rem">Estado</th>
          <th style="width: 7rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.numeroResolucion }}</td>
          <td class="nx-mono">{{ row.prefijo }}</td>
          <td class="nx-mono">{{ row.facturaInicial }} – {{ row.facturaFinal }}</td>
          <td>{{ row.fechaFinal }}</td>
          <td class="r nx-mono">{{ row.consecutivoActual }}</td>
          <td>
            <p-tag
              [value]="row.active ? 'Activa' : 'Inactiva'"
              [severity]="row.active ? 'success' : 'danger'"
            />
          </td>
          <td class="text-center">
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button
              pButton
              icon="pi pi-trash"
              severity="danger"
              [text]="true"
              (click)="eliminar(row)"
            ></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="7" class="empty-row">Sin resoluciones DIAN</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-resolucion-dian
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [registro]="editing()"
  (saved)="onSaved()"
/>
