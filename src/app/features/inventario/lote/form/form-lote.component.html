<p-dialog
  [header]="isEdit() ? 'Editar lote' : 'Nuevo lote'"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [style]="{ width: '520px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="dialog-form">
    <div class="grid2">
      <div class="field">
        <label for="l-codigo">Código *</label>
        <input pInputText id="l-codigo" formControlName="codigo" [class.ng-invalid]="isInvalid('codigo')" />
        @if (isInvalid('codigo')) { <small class="error">Obligatorio</small> }
      </div>
      <div class="field">
        <label for="l-variante">Variante de producto (ID)</label>
        <p-inputNumber inputId="l-variante" formControlName="productoVarianteId" [useGrouping]="false" />
      </div>
      <div class="field col-2">
        <label for="l-nombre">Nombre</label>
        <input pInputText id="l-nombre" formControlName="nombre" />
      </div>
      <div class="field">
        <label for="l-fab">Fecha fabricación</label>
        <input pInputText id="l-fab" type="date" formControlName="fechaFabricado" />
      </div>
      <div class="field">
        <label for="l-ven">Fecha vencimiento</label>
        <input pInputText id="l-ven" type="date" formControlName="fechaVencimiento" />
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="loading()" (onClick)="save()" />
  </ng-template>
</p-dialog>
