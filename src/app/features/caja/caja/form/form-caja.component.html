<p-dialog
  [header]="isEdit() ? 'Editar caja' : 'Nueva caja'"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [style]="{ width: '440px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="dialog-form">
    <div class="field">
      <label for="cj-codigo">Código</label>
      <input pInputText id="cj-codigo" formControlName="codigo" class="w-full" [class.ng-invalid]="isInvalid('codigo')" />
      @if (isInvalid('codigo')) { <small class="error">El código es obligatorio</small> }
    </div>
    <div class="field">
      <label for="cj-nombre">Nombre</label>
      <input pInputText id="cj-nombre" formControlName="nombre" class="w-full" />
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="loading()" (onClick)="save()" />
  </ng-template>
</p-dialog>
