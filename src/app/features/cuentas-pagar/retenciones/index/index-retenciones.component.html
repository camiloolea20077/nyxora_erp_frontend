<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-percentage"></i></span>
      <div>
        <h1 class="head-title">Retenciones</h1>
        <p class="head-sub">Retenciones por obligación de pago — abre la obligación para ver el detalle</p>
      </div>
    </div>
  </header>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 10rem">Obligación</th>
          <th style="width: 9rem">Proveedor</th>
          <th style="width: 12rem" class="r">Valor total</th>
          <th style="width: 12rem" class="r">Saldo</th>
          <th style="width: 9rem">Estado</th>
          <th style="width: 7rem" class="text-center">Ver</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.numero ?? '#' + row.id }}</td>
          <td class="nx-mono">#{{ row.proveedorId }}</td>
          <td class="r nx-mono">{{ row.valorTotal | number: '1.2-2' }}</td>
          <td class="r nx-mono">{{ row.saldo | number: '1.2-2' }}</td>
          <td><p-tag [value]="row.estado" /></td>
          <td class="text-center">
            <button pButton icon="pi pi-eye" [text]="true" pTooltip="Ver retenciones" (click)="ver(row)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="empty-row">Sin obligaciones</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>
