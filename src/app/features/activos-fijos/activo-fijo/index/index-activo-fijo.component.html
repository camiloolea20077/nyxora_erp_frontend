<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-desktop"></i></span>
      <div>
        <h1 class="head-title">Activos fijos</h1>
        <p class="head-sub">Bienes de la empresa, depreciación y custodia</p>
      </div>
    </div>
    <p-button label="Nuevo activo" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="toolbar">
    <span class="search">
      <i class="pi pi-search"></i>
      <input pInputText type="text" placeholder="Buscar por código, nombre o serie…" [(ngModel)]="search" (keyup.enter)="onSearch()" />
    </span>
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 12rem">Código</th>
          <th>Nombre</th>
          <th style="width: 11rem">Serie</th>
          <th style="width: 11rem" class="text-right">Valor compra</th>
          <th style="width: 11rem" class="text-right">Valor actual</th>
          <th style="width: 9rem">Estado</th>
          <th style="width: 9rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.codigo }}</td>
          <td>{{ row.nombre }}</td>
          <td>{{ row.numeroSerie }}</td>
          <td class="text-right">{{ row.valorCompra | number: '1.0-0' }}</td>
          <td class="text-right">{{ row.valorActual | number: '1.0-0' }}</td>
          <td><p-tag [value]="row.estadoActivo ?? '—'" severity="info" /></td>
          <td class="text-center">
            <button pButton icon="pi pi-eye" [text]="true" (click)="ver(row)"></button>
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="7" class="empty-row">Sin activos fijos registrados</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-activo-fijo [visible]="showForm()" (visibleChange)="showForm.set($event)" [registro]="editing()" (saved)="onSaved()" />
