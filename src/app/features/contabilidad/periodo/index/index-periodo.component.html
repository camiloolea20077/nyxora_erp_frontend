<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-calendar"></i></span>
      <div>
        <h1 class="head-title">Periodos contables</h1>
        <p class="head-sub">Periodos mensuales por vigencia</p>
      </div>
    </div>
    <p-button label="Nuevo periodo" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[12, 24, 48]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 10rem">Año</th>
          <th>Mes</th>
          <th style="width: 10rem">Estado</th>
          <th style="width: 10rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.anio }}</td>
          <td>{{ mes(row.mes) }}</td>
          <td><p-tag [value]="row.estado" [severity]="estadoSeverity(row.estado)" /></td>
          <td class="text-center">
            @if (row.estado !== 'cerrado') {
              <button pButton icon="pi pi-lock" [text]="true" pTooltip="Cerrar" (click)="cerrar(row)"></button>
            } @else {
              <button pButton icon="pi pi-lock-open" [text]="true" pTooltip="Reabrir" (click)="reabrir(row)"></button>
            }
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="empty-row">Sin periodos</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<app-form-periodo [visible]="showForm()" (visibleChange)="showForm.set($event)" (saved)="onSaved()" />
