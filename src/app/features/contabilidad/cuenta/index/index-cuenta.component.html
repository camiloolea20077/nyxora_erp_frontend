<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-list"></i></span>
      <div>
        <h1 class="head-title">Plan de cuentas</h1>
        <p class="head-sub">Estructura contable (PUC)</p>
      </div>
    </div>
    <p-button label="Nueva cuenta" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="toolbar">
    <span class="search">
      <i class="pi pi-search"></i>
      <input pInputText type="text" placeholder="Buscar por código o nombre…" [(ngModel)]="search" (keyup.enter)="onSearch()" />
    </span>
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 11rem">Código</th>
          <th>Nombre</th>
          <th style="width: 8rem">Naturaleza</th>
          <th style="width: 8rem">Movimiento</th>
          <th style="width: 8rem">Estado</th>
          <th style="width: 7rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.codigoCuenta }}</td>
          <td>{{ row.nombreCuenta }}</td>
          <td>{{ row.naturaleza }}</td>
          <td>@if (row.manejaMovimiento) { <p-tag value="Sí" severity="info" /> }</td>
          <td><p-tag [value]="row.active ? 'Activa' : 'Inactiva'" [severity]="row.active ? 'success' : 'danger'" /></td>
          <td class="text-center">
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="empty-row">Sin cuentas</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-cuenta
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [registro]="editing()"
  (saved)="onSaved()"
/>
