<p-dialog
  [header]="isEdit() ? 'Editar asignatura' : 'Nueva asignatura'"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  (onShow)="onShow()"
  [modal]="true"
  [style]="{ width: '520px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="dialog-form">
    <div class="grid2">
      <div class="field">
        <label for="a-codigo">Código</label>
        <input pInputText id="a-codigo" formControlName="codigo" class="w-full" [class.ng-invalid]="isInvalid('codigo')" />
        @if (isInvalid('codigo')) { <small class="error">El código es obligatorio</small> }
      </div>
      <div class="field">
        <label for="a-nombre">Nombre</label>
        <input pInputText id="a-nombre" formControlName="nombre" class="w-full" [class.ng-invalid]="isInvalid('nombre')" />
        @if (isInvalid('nombre')) { <small class="error">El nombre es obligatorio</small> }
      </div>
      <div class="field col-2">
        <label for="a-desc">Descripción</label>
        <textarea pTextarea id="a-desc" formControlName="descripcion" rows="2" class="w-full"></textarea>
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="loading()" (onClick)="save()" />
  </ng-template>
</p-dialog>
