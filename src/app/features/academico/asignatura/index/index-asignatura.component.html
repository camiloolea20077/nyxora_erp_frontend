<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-book"></i></span>
      <div>
        <h1 class="head-title">Asignaturas</h1>
        <p class="head-sub">Asignaturas y su asociación a programas</p>
      </div>
    </div>
    <p-button label="Nueva asignatura" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="toolbar">
    <span class="search">
      <i class="pi pi-search"></i>
      <input pInputText type="text" placeholder="Buscar…" [(ngModel)]="search" (keyup.enter)="onSearch()" />
    </span>
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 12rem">Código</th>
          <th>Nombre</th>
          <th style="width: 8rem">Estado</th>
          <th style="width: 13rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.codigo }}</td>
          <td>{{ row.nombre }}</td>
          <td><p-tag [value]="row.active ? 'Activo' : 'Inactivo'" [severity]="row.active ? 'success' : 'danger'" /></td>
          <td class="text-center">
            <p-button label="Programas" icon="pi pi-sitemap" size="small" [text]="true" (onClick)="programas(row)" />
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="empty-row">Sin asignaturas registradas</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-asignatura [visible]="showForm()" (visibleChange)="showForm.set($event)" [registro]="editing()" (saved)="onSaved()" />

<p-dialog
  [header]="'Programas de ' + programasAsignaturaNombre()"
  [visible]="showProgramas()"
  (visibleChange)="showProgramas.set($event)"
  [modal]="true"
  [style]="{ width: '640px' }"
  [draggable]="false"
  [resizable]="false"
>
  @if (showProgramas() && programasAsignaturaId(); as aid) {
    <app-programas-asignatura [asignaturaId]="aid" />
  }
</p-dialog>
