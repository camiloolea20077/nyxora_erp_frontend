<p-dialog
  [header]="isEdit() ? 'Editar tipo de documento' : 'Nuevo tipo de documento'"
  [visible]="visible()"
  (visibleChange)="visible.set($event)"
  [modal]="true"
  [style]="{ width: '520px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="dialog-form">
    <div class="grid2">
      <div class="field">
        <label for="td-modulo">Módulo *</label>
        <input pInputText id="td-modulo" formControlName="modulo" [class.ng-invalid]="isInvalid('modulo')" />
        @if (isInvalid('modulo')) { <small class="error">Obligatorio</small> }
      </div>
      <div class="field">
        <label for="td-codigo">Código *</label>
        <input pInputText id="td-codigo" formControlName="codigo" [class.ng-invalid]="isInvalid('codigo')" />
        @if (isInvalid('codigo')) { <small class="error">Obligatorio</small> }
      </div>
      <div class="field col-2">
        <label for="td-nombre">Nombre *</label>
        <input pInputText id="td-nombre" formControlName="nombre" [class.ng-invalid]="isInvalid('nombre')" />
        @if (isInvalid('nombre')) { <small class="error">Obligatorio</small> }
      </div>
      <div class="field">
        <label for="td-prefijo">Prefijo</label>
        <input pInputText id="td-prefijo" formControlName="prefijo" />
      </div>
    </div>
    <div class="field-check">
      <p-checkbox formControlName="reiniciaPorVigencia" [binary]="true" inputId="td-reinicia" />
      <label for="td-reinicia">Reinicia consecutivo por vigencia</label>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="loading()" (onClick)="save()" />
  </ng-template>
</p-dialog>
