<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-sliders-h"></i></span>
      <div>
        <h1 class="head-title">Parámetros</h1>
        <p class="head-sub">Configuración del sistema</p>
      </div>
    </div>
    <p-button label="Nuevo parámetro" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="toolbar">
    <span class="search">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Buscar por clave…"
        [(ngModel)]="search"
        (keyup.enter)="onSearch()"
      />
    </span>
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Clave</th>
          <th>Valor</th>
          <th style="width: 8rem">Tipo</th>
          <th style="width: 8rem">Estado</th>
          <th style="width: 7rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.key }}</td>
          <td>{{ row.value }}</td>
          <td><p-tag [value]="row.dataType" severity="secondary" /></td>
          <td>
            <p-tag [value]="row.active ? 'Activo' : 'Inactivo'" [severity]="row.active ? 'success' : 'danger'" />
          </td>
          <td class="text-center">
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr><td colspan="5" class="empty-row">Sin parámetros registrados</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-parametro
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [registro]="editing()"
  (saved)="onSaved()"
/>
