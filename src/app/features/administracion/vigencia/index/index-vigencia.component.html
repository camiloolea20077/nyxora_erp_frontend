<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-calendar"></i></span>
      <div>
        <h1 class="head-title">Vigencias</h1>
        <p class="head-sub">Periodos fiscales y su estado</p>
      </div>
    </div>
    <p-button label="Nueva vigencia" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 10rem">Año</th>
          <th>Estado</th>
          <th style="width: 8rem">Activa</th>
          <th style="width: 12rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.year }}</td>
          <td><p-tag [value]="statusLabel(row.status)" [severity]="statusSeverity(row.status)" /></td>
          <td>
            <p-tag
              [value]="row.active ? 'Sí' : 'No'"
              [severity]="row.active ? 'success' : 'danger'"
            />
          </td>
          <td class="text-center">
            @if (row.status === 'planeada') {
              <button pButton icon="pi pi-lock-open" [text]="true" pTooltip="Abrir" (click)="abrir(row)"></button>
            }
            @if (row.status === 'abierta') {
              <button pButton icon="pi pi-lock" [text]="true" pTooltip="Cerrar" (click)="cerrar(row)"></button>
            }
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="empty-row">Sin vigencias registradas</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-vigencia
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [registro]="editing()"
  (saved)="onSaved()"
/>
