<section class="sat">
  <div class="sat-head">
    <h3>Contactos</h3>
    <p-button label="Agregar" icon="pi pi-plus" size="small" [outlined]="true" (onClick)="nuevo()" />
  </div>

  <p-table [value]="items()" [loading]="loading()" dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th>Cargo</th>
        <th>Teléfono</th>
        <th>Email</th>
        <th style="width: 6rem">Principal</th>
        <th style="width: 6rem" class="text-center">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.nombre }}</td>
        <td>{{ row.cargo }}</td>
        <td>{{ row.celular || row.telefono }}</td>
        <td>{{ row.email }}</td>
        <td>@if (row.principal) { <p-tag value="Sí" severity="success" /> }</td>
        <td class="text-center">
          <button pButton icon="pi pi-pencil" [text]="true" size="small" (click)="editar(row)"></button>
          <button pButton icon="pi pi-trash" severity="danger" [text]="true" size="small" (click)="eliminar(row)"></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="empty-row">Sin contactos</td></tr>
    </ng-template>
  </p-table>
</section>

<p-dialog
  [header]="isEdit() ? 'Editar contacto' : 'Nuevo contacto'"
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [modal]="true"
  [style]="{ width: '520px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="sat-dialog-form">
    <div class="sat-grid">
      <div class="field">
        <label for="c-nombre">Nombre *</label>
        <input pInputText id="c-nombre" formControlName="nombre" />
      </div>
      <div class="field">
        <label for="c-cargo">Cargo</label>
        <input pInputText id="c-cargo" formControlName="cargo" />
      </div>
      <div class="field">
        <label for="c-telefono">Teléfono</label>
        <input pInputText id="c-telefono" formControlName="telefono" />
      </div>
      <div class="field">
        <label for="c-celular">Celular</label>
        <input pInputText id="c-celular" formControlName="celular" />
      </div>
      <div class="field col-2">
        <label for="c-email">Email</label>
        <input pInputText id="c-email" type="email" formControlName="email" />
      </div>
      <div class="field col-2">
        <label for="c-notas">Notas</label>
        <input pInputText id="c-notas" formControlName="notas" />
      </div>
      <div class="sat-check">
        <p-checkbox formControlName="principal" [binary]="true" inputId="c-principal" />
        <label for="c-principal">Contacto principal</label>
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
