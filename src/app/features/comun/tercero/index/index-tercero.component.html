<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-users"></i></span>
      <div>
        <h1 class="head-title">Terceros</h1>
        <p class="head-sub">Clientes, proveedores, empleados y más</p>
      </div>
    </div>
    <p-button label="Nuevo tercero" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="filtros">
    <span class="search">
      <i class="pi pi-search"></i>
      <input
        pInputText
        type="text"
        placeholder="Buscar por nombre o documento…"
        [(ngModel)]="search"
        (keyup.enter)="buscar()"
      />
    </span>
    <p-select
      [(ngModel)]="filtroTipoPersona"
      [options]="personas"
      optionLabel="label"
      optionValue="value"
      placeholder="Tipo de persona"
      styleClass="f-select"
    />
    <p-select
      [(ngModel)]="filtroTipoTerceroId"
      [options]="tiposTercero()"
      optionLabel="nombre"
      optionValue="id"
      [showClear]="true"
      placeholder="Clasificación"
      styleClass="f-select"
    />
    <p-button label="Buscar" icon="pi pi-search" (onClick)="buscar()" />
    <p-button label="Limpiar" icon="pi pi-filter-slash" severity="secondary" [text]="true" (onClick)="limpiar()" />
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 7rem">Tipo doc</th>
          <th style="width: 11rem">Documento</th>
          <th>Nombre</th>
          <th style="width: 8rem">Tipo</th>
          <th style="width: 8rem">Estado</th>
          <th style="width: 7rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>

      <ng-template pTemplate="body" let-row>
        <tr>
          <td class="nx-mono">{{ row.tipoDocumento }}</td>
          <td class="nx-mono">{{ row.numeroDocumento }}</td>
          <td>{{ row.nombre }}</td>
          <td>
            <p-tag
              [value]="row.tipoPersona === 'juridica' ? 'Jurídica' : 'Natural'"
              severity="secondary"
            />
          </td>
          <td>
            <p-tag [value]="row.active ? 'Activo' : 'Inactivo'" [severity]="row.active ? 'success' : 'danger'" />
          </td>
          <td class="text-center">
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>

      <ng-template pTemplate="emptymessage">
        <tr><td colspan="6" class="empty-row">Sin terceros para los filtros</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
