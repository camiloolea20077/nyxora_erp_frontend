<section class="sat">
  <div class="sat-head">
    <h3>Proveedores</h3>
    <p-button label="Agregar" icon="pi pi-plus" size="small" [outlined]="true" (onClick)="nuevo()" />
  </div>

  <p-table [value]="items()" [loading]="loading()" dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th style="width: 8rem">Proveedor</th>
        <th>Código en proveedor</th>
        <th style="width: 9rem">Cant. mínima</th>
        <th style="width: 9rem">Plazo (días)</th>
        <th style="width: 6rem" class="text-center">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td class="nx-mono">#{{ row.proveedorId }}</td>
        <td class="nx-mono">{{ row.codigoProducto }}</td>
        <td class="nx-mono">{{ row.cantidadMinima }}</td>
        <td class="nx-mono">{{ row.plazoEntrega }}</td>
        <td class="text-center">
          <button pButton icon="pi pi-pencil" [text]="true" size="small" (click)="editar(row)"></button>
          <button pButton icon="pi pi-trash" severity="danger" [text]="true" size="small" (click)="eliminar(row)"></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="5" class="empty-row">Sin proveedores</td></tr>
    </ng-template>
  </p-table>
</section>

<p-dialog
  [header]="isEdit() ? 'Editar proveedor' : 'Nuevo proveedor'"
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [modal]="true"
  [style]="{ width: '540px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="sat-dialog-form">
    <div class="field">
      <label>Proveedor *</label>
      <div class="prov-pick">
        <span class="picked" [class.empty]="!proveedorNombre()">{{ proveedorNombre() || 'Ninguno seleccionado' }}</span>
        <p-button label="Buscar" icon="pi pi-search" [outlined]="true" (onClick)="openSelector()" />
      </div>
    </div>
    <div class="sat-grid">
      <div class="field">
        <label for="pp-codigo">Código en proveedor</label>
        <input pInputText id="pp-codigo" formControlName="codigoProducto" />
      </div>
      <div class="field">
        <label for="pp-cant">Cantidad mínima</label>
        <p-inputNumber inputId="pp-cant" formControlName="cantidadMinima" [minFractionDigits]="0" [maxFractionDigits]="4" />
      </div>
      <div class="field">
        <label for="pp-plazo">Plazo de entrega (días)</label>
        <p-inputNumber inputId="pp-plazo" formControlName="plazoEntrega" [useGrouping]="false" />
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>

<app-tercero-selector
  [visible]="showSelector()"
  (visibleChange)="showSelector.set($event)"
  header="Buscar proveedor"
  (selected)="onProveedorSelected($event)"
/>
