<section class="sat">
  <div class="sat-head">
    <h3>Familiares</h3>
    <p-button label="Agregar" icon="pi pi-plus" size="small" [outlined]="true" (onClick)="nuevo()" />
  </div>

  <p-table [value]="items()" [loading]="loading()" dataKey="id">
    <ng-template pTemplate="header">
      <tr>
        <th>Nombre</th>
        <th style="width: 9rem">Parentesco</th>
        <th style="width: 9rem">Nacimiento</th>
        <th style="width: 6rem">A cargo</th>
        <th style="width: 6rem">Convive</th>
        <th style="width: 6rem" class="text-center">Acciones</th>
      </tr>
    </ng-template>
    <ng-template pTemplate="body" let-row>
      <tr>
        <td>{{ row.nombreApellido }}</td>
        <td>{{ row.parentesco }}</td>
        <td>{{ row.fechaNacimiento }}</td>
        <td>@if (row.aCargo) { <p-tag value="Sí" severity="success" /> }</td>
        <td>@if (row.convive) { <p-tag value="Sí" severity="info" /> }</td>
        <td class="text-center">
          <button pButton icon="pi pi-pencil" [text]="true" size="small" (click)="editar(row)"></button>
          <button pButton icon="pi pi-trash" severity="danger" [text]="true" size="small" (click)="eliminar(row)"></button>
        </td>
      </tr>
    </ng-template>
    <ng-template pTemplate="emptymessage">
      <tr><td colspan="6" class="empty-row">Sin familiares</td></tr>
    </ng-template>
  </p-table>
</section>

<p-dialog
  [header]="isEdit() ? 'Editar familiar' : 'Nuevo familiar'"
  [visible]="showForm()"
  (visibleChange)="showForm.set($event)"
  [modal]="true"
  [style]="{ width: '560px' }"
  [draggable]="false"
  [resizable]="false"
>
  <form [formGroup]="frm" class="sat-dialog-form">
    <div class="sat-grid">
      <div class="field col-2">
        <label for="f-nom">Nombre y apellido *</label>
        <input pInputText id="f-nom" formControlName="nombreApellido" />
      </div>
      <div class="field">
        <label for="f-par">Parentesco</label>
        <input pInputText id="f-par" formControlName="parentesco" />
      </div>
      <div class="field">
        <label for="f-fn">Fecha de nacimiento</label>
        <input pInputText id="f-fn" type="date" formControlName="fechaNacimiento" />
      </div>
      <div class="sat-check">
        <p-checkbox formControlName="aCargo" [binary]="true" inputId="f-cargo" />
        <label for="f-cargo">A cargo</label>
      </div>
      <div class="sat-check">
        <p-checkbox formControlName="vivo" [binary]="true" inputId="f-vivo" />
        <label for="f-vivo">Vivo</label>
      </div>
      <div class="sat-check">
        <p-checkbox formControlName="convive" [binary]="true" inputId="f-conv" />
        <label for="f-conv">Convive</label>
      </div>
      <div class="sat-check">
        <p-checkbox formControlName="dependienteRetencion" [binary]="true" inputId="f-dep" />
        <label for="f-dep">Dependiente (retención)</label>
      </div>
    </div>
  </form>

  <ng-template pTemplate="footer">
    <p-button label="Cancelar" severity="secondary" [text]="true" (onClick)="close()" />
    <p-button [label]="isEdit() ? 'Actualizar' : 'Guardar'" icon="pi pi-check" [loading]="saving()" (onClick)="save()" />
  </ng-template>
</p-dialog>
