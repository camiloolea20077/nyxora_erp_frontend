<div class="page">
  <header class="page-head">
    <div class="head-left">
      <span class="head-icon"><i class="pi pi-flag"></i></span>
      <div>
        <h1 class="head-title">Procesos disciplinarios</h1>
        <p class="head-sub">Debido proceso: faltas, descargos y notificaciones</p>
      </div>
    </div>
    <p-button label="Nuevo proceso" icon="pi pi-plus" (onClick)="nuevo()" />
  </header>

  <div class="toolbar">
    <span class="search">
      <i class="pi pi-search"></i>
      <input pInputText type="text" placeholder="Buscar por investigado…" [(ngModel)]="search" (keyup.enter)="onSearch()" />
    </span>
  </div>

  <div class="table-card">
    <p-table
      [value]="rows()"
      [lazy]="true"
      [loading]="loading()"
      [paginator]="true"
      [rows]="pageSize()"
      [totalRecords]="total()"
      [rowsPerPageOptions]="[10, 20, 50]"
      (onLazyLoad)="onLazy($event)"
      dataKey="id"
    >
      <ng-template pTemplate="header">
        <tr>
          <th style="width: 10rem">Fecha</th>
          <th>Investigado</th>
          <th style="width: 11rem">Estado</th>
          <th style="width: 13rem" class="text-center">Acciones</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-row>
        <tr>
          <td>{{ row.fecha }}</td>
          <td>{{ row.investigadoNombre }}</td>
          <td><p-tag [value]="row.estado" severity="info" /></td>
          <td class="text-center">
            <p-button label="Gestionar" icon="pi pi-folder-open" size="small" [outlined]="true" (onClick)="abrir(row)" />
            <button pButton icon="pi pi-pencil" [text]="true" (click)="editar(row)"></button>
            <button pButton icon="pi pi-trash" severity="danger" [text]="true" (click)="eliminar(row)"></button>
          </td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr><td colspan="4" class="empty-row">Sin procesos registrados</td></tr>
      </ng-template>
    </p-table>
  </div>
</div>

<p-confirmDialog />
<app-form-proceso-disciplinario [visible]="showForm()" (visibleChange)="showForm.set($event)" [registro]="editing()" (saved)="onSaved()" />
